<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentriX — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
  <style>
    body { overflow: hidden; background: #030712; }

    .bg-grid {
      position: fixed; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(16,185,129,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16,185,129,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      animation: grid-drift 20s linear infinite;
    }
    @keyframes grid-drift {
      from { transform: translateY(0); }
      to   { transform: translateY(48px); }
    }

    .orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; animation: orb-float 8s ease-in-out infinite alternate; }
    .orb-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(16,185,129,0.12), transparent 70%); top: -100px; left: -100px; animation-duration: 10s; }
    .orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(59,130,246,0.08), transparent 70%); bottom: -80px; right: -80px; animation-duration: 13s; animation-direction: alternate-reverse; }
    .orb-3 { width: 200px; height: 200px; background: radial-gradient(circle, rgba(139,92,246,0.07), transparent 70%); top: 50%; right: 20%; animation-duration: 7s; }
    @keyframes orb-float { from { transform: translate(0,0) scale(1); } to { transform: translate(30px,20px) scale(1.1); } }

    .login-card { animation: card-rise 0.6s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes card-rise { from { opacity:0; transform: translateY(40px) scale(0.95); } to { opacity:1; transform: translateY(0) scale(1); } }

    .logo-ring { animation: logo-in 0.7s 0.1s cubic-bezier(0.34,1.56,0.64,1) both; }
    @keyframes logo-in { from { opacity:0; transform: scale(0.5) rotate(-20deg); } to { opacity:1; transform: scale(1) rotate(0deg); } }

    .logo-scan { position: absolute; inset:0; border-radius: 18px; overflow: hidden; }
    .logo-scan::after { content:''; position: absolute; width:100%; height:2px; background: linear-gradient(90deg, transparent, rgba(16,185,129,0.8), transparent); top:-2px; animation: scan 2.5s ease-in-out infinite; }
    @keyframes scan { 0% { top:-2px; opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { top:100%; opacity:0; } }

    .input-wrap { animation: field-in 0.5s ease-out both; }
    .input-wrap:nth-child(1) { animation-delay: 0.3s; }
    .input-wrap:nth-child(2) { animation-delay: 0.4s; }
    @keyframes field-in { from { opacity:0; transform: translateX(-12px); } to { opacity:1; transform: translateX(0); } }

    .field-input {
      width: 100%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 13px 14px 13px 44px; color: #e5e7eb;
      font-size: 0.9rem; transition: all 0.25s; outline: none;
    }
    .field-input:focus {
      border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.04);
      box-shadow: 0 0 0 3px rgba(16,185,129,0.1), 0 4px 20px rgba(0,0,0,0.2);
    }
    .field-input::placeholder { color: #374151; }
    .field-icon { position: absolute; left:14px; top:50%; transform: translateY(-50%); color:#4b5563; font-size:0.85rem; transition: color 0.2s; pointer-events: none; }
    .field-wrap:focus-within .field-icon { color: #10b981; }

    .submit-btn {
      width: 100%; background: linear-gradient(135deg, #10b981, #059669);
      color: white; border: none; border-radius: 12px; padding: 13px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.25s;
      position: relative; overflow: hidden;
      animation: btn-in 0.5s 0.5s ease-out both;
      box-shadow: 0 4px 20px rgba(16,185,129,0.3);
    }
    .submit-btn::before { content:''; position:absolute; inset:0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); opacity:0; transition: opacity 0.2s; }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(16,185,129,0.4); }
    .submit-btn:hover::before { opacity: 1; }
    .submit-btn:active { transform: translateY(0) scale(0.98); }
    @keyframes btn-in { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    .shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); }
    @keyframes shake { 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-4px)} 40%,60%{transform:translateX(4px)} }

    .demo-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; color: #9ca3af; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .demo-btn:hover { background: rgba(255,255,255,0.07); border-color: rgba(16,185,129,0.3); color: #d1d5db; transform: translateY(-1px); }

    .typing-dot { width:6px; height:6px; border-radius:50%; background:white; animation: typing 1s ease-in-out infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typing { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-4px);opacity:1} }

    .particle { position:fixed; width:2px; height:2px; border-radius:50%; background:rgba(16,185,129,0.4); pointer-events:none; animation: particle-float linear infinite; }
    @keyframes particle-float { from{transform:translateY(100vh) rotate(0deg);opacity:0} 10%{opacity:1} 90%{opacity:1} to{transform:translateY(-10vh) rotate(360deg);opacity:0} }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen">

  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div id="particles"></div>

  <div class="relative z-10 w-full max-w-md px-5">

    <!-- Logo -->
    <div class="text-center mb-8 logo-ring">
      <div class="inline-block relative mb-4">
        <div class="w-20 h-20 rounded-2xl bg-gradient-to-br from-emerald-500/20 to-emerald-900/20 border border-emerald-500/30 flex items-center justify-center shadow-2xl shadow-emerald-500/20 relative logo-scan">
          <i class="fa-solid fa-shield-halved text-3xl text-emerald-400"></i>
        </div>
        <div class="absolute -inset-2 rounded-3xl border border-emerald-500/10 animate-spin" style="animation-duration:8s"></div>
      </div>
      <h1 class="text-4xl font-bold text-white tracking-tight">Sentri<span class="text-emerald-400">X</span></h1>
      <p class="text-gray-500 text-sm mt-1.5 tracking-wide">AI-Driven Security Operations Center</p>
    </div>

    <!-- Card -->
    <div class="login-card rounded-2xl p-8" style="background: linear-gradient(135deg, rgba(13,17,23,0.97), rgba(17,24,39,0.97)); border: 1px solid rgba(255,255,255,0.07); backdrop-filter: blur(20px); box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03);">

      <h2 class="text-white font-semibold text-lg mb-6">Sign in to your account</h2>

      <div id="error-msg" class="hidden mb-4 px-4 py-3 rounded-xl text-sm flex items-center gap-2" style="background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);color:#f87171;">
        <i class="fa-solid fa-circle-exclamation"></i>
        <span id="error-text"></span>
      </div>

      <form id="login-form" class="space-y-4">
        <div class="input-wrap">
          <label class="block text-gray-400 text-xs font-semibold mb-2 tracking-wide uppercase">Username</label>
          <div class="field-wrap relative">
            <i class="fa-solid fa-user field-icon"></i>
            <input type="text" id="username" class="field-input" placeholder="admin" required autocomplete="username" />
          </div>
        </div>

        <div class="input-wrap">
          <label class="block text-gray-400 text-xs font-semibold mb-2 tracking-wide uppercase">Password</label>
          <div class="field-wrap relative">
            <i class="fa-solid fa-lock field-icon"></i>
            <input type="password" id="password" class="field-input" style="padding-right:44px" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" id="toggle-pwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-600 hover:text-gray-400 transition">
              <i class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <div style="padding-top:4px">
          <button type="submit" id="login-btn" class="submit-btn">
            <span id="btn-content" class="flex items-center justify-center gap-2">
              <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </span>
          </button>
        </div>
      </form>

      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px" style="background:rgba(255,255,255,0.05)"></div>
        <span class="text-gray-600 text-xs">Demo Credentials</span>
        <div class="flex-1 h-px" style="background:rgba(255,255,255,0.05)"></div>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <button onclick="fillCredentials('admin','admin123')" class="demo-btn">
          <i class="fa-solid fa-user-shield text-emerald-500 text-sm"></i>
          <div class="text-left">
            <div class="font-medium text-gray-300 text-xs">Admin</div>
            <div class="text-gray-600" style="font-size:0.7rem">admin123</div>
          </div>
        </button>
        <button onclick="fillCredentials('analyst','analyst123')" class="demo-btn">
          <i class="fa-solid fa-user text-blue-400 text-sm"></i>
          <div class="text-left">
            <div class="font-medium text-gray-300 text-xs">Analyst</div>
            <div class="text-gray-600" style="font-size:0.7rem">analyst123</div>
          </div>
        </button>
      </div>
    </div>

    <p class="text-center text-gray-700 text-xs mt-6">SentriX v1.0 &mdash; Applied Science Private University &copy; 2025-2026</p>
  </div>

  <script>
    // Particles
    const pc = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}vw;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;opacity:${Math.random()*0.5+0.1};`;
      pc.appendChild(p);
    }

    function fillCredentials(user, pass) {
      const u = document.getElementById('username'), p = document.getElementById('password');
      u.value = ''; p.value = '';
      let i = 0;
      const t1 = setInterval(() => { u.value += user[i++]; if (i >= user.length) { clearInterval(t1); let j=0; const t2 = setInterval(()=>{ p.value += pass[j++]; if(j>=pass.length) clearInterval(t2); },60); } }, 60);
    }

    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.querySelector('#toggle-pwd i');
      pwd.type = pwd.type === 'password' ? 'text' : 'password';
      icon.className = pwd.type === 'password' ? 'fa-solid fa-eye text-sm' : 'fa-solid fa-eye-slash text-sm';
    });

    document.getElementById('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const content = document.getElementById('btn-content');
      const errDiv = document.getElementById('error-msg');
      const errText = document.getElementById('error-text');

      btn.disabled = true;
      content.innerHTML = `<div class="flex items-center gap-2"><div class="flex gap-1"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>Authenticating</div>`;
      errDiv.classList.add('hidden');

      const fd = new FormData();
      fd.append('username', document.getElementById('username').value);
      fd.append('password', document.getElementById('password').value);

      try {
        const resp = await fetch('/api/auth/login', { method: 'POST', body: fd });
        const data = await resp.json();
        if (resp.ok) {
          localStorage.setItem('sentrix_token', data.access_token);
          localStorage.setItem('sentrix_user', JSON.stringify(data.user));
          content.innerHTML = '<i class="fa-solid fa-check"></i> Redirecting...';
          btn.style.background = 'linear-gradient(135deg, #059669, #047857)';
          setTimeout(() => window.location.href = '/dashboard.html', 500);
        } else {
          errText.textContent = data.detail || 'Invalid username or password.';
          errDiv.classList.remove('hidden');
          errDiv.classList.add('shake');
          setTimeout(() => errDiv.classList.remove('shake'), 400);
          content.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
          btn.disabled = false;
        }
      } catch {
        errText.textContent = 'Connection error. Please try again.';
        errDiv.classList.remove('hidden');
        content.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Sign In';
        btn.disabled = false;
      }
    });

    if (localStorage.getItem('sentrix_token')) window.location.href = '/dashboard.html';
  </script>
</body>
</html>
