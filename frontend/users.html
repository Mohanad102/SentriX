<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentriX — User Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 flex">

  <aside class="sidebar bg-gray-900 border-r border-gray-800 flex flex-col min-h-screen sticky top-0">
    <div class="p-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center">
          <i class="fa-solid fa-shield-halved text-emerald-400 text-sm"></i>
        </div>
        <span class="text-white font-bold text-lg">Sentri<span class="text-emerald-400">X</span></span>
      </div>
    </div>
    <nav class="p-3 flex-1 space-y-1">
      <a href="/dashboard.html" class="sidebar-link"><span class="icon"><i class="fa-solid fa-gauge-high"></i></span> Dashboard</a>
      <a href="/alerts.html" class="sidebar-link"><span class="icon"><i class="fa-solid fa-bell"></i></span> Alerts</a>
      <a href="/incidents.html" class="sidebar-link"><span class="icon"><i class="fa-solid fa-file-shield"></i></span> Incidents</a>
      <a href="/ai_analyst.html" class="sidebar-link"><span class="icon"><i class="fa-solid fa-robot"></i></span> AI Analyst</a>
      <a href="/reports.html" class="sidebar-link"><span class="icon"><i class="fa-solid fa-chart-bar"></i></span> Reports</a>
      <a href="/users.html" class="sidebar-link active"><span class="icon"><i class="fa-solid fa-users-gear"></i></span> Users</a>
      <a href="/rules.html" class="sidebar-link"><span class="icon"><i class="fa-solid fa-sliders"></i></span> Alert Rules</a>
    </nav>
    <div class="p-3 border-t border-gray-800">
      <div class="flex items-center gap-3 px-2 py-2">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold text-sm user-avatar">A</div>
        <div class="flex-1 min-w-0"><p class="text-sm font-medium text-white truncate user-name">Admin</p><p class="text-xs text-gray-500 user-role">ADMIN</p></div>
        <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition"><i class="fa-solid fa-right-from-bracket text-sm"></i></button>
      </div>
    </div>
  </aside>

  <main class="flex-1 min-h-screen overflow-auto">
    <header class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 flex items-center justify-between sticky top-0 backdrop-blur z-10">
      <div>
        <h1 class="text-white font-semibold text-lg">User Management</h1>
        <p class="text-gray-500 text-xs">Manage accounts, roles, and access</p>
      </div>
      <button onclick="openCreateModal()" class="btn btn-primary">
        <i class="fa-solid fa-user-plus"></i> New User
      </button>
    </header>

    <div class="p-6 page-fade">
      <!-- Tabs -->
      <div class="flex gap-1 mb-5 bg-gray-900 border border-gray-800 rounded-xl p-1 max-w-xs">
        <button onclick="showTab('users')" id="tab-users-btn" class="tab-btn active flex-1 py-1.5 text-xs font-medium rounded transition">
          <i class="fa-solid fa-users mr-1"></i> Users
        </button>
        <button onclick="showTab('audit')" id="tab-audit-btn" class="tab-btn flex-1 py-1.5 text-xs font-medium rounded transition">
          <i class="fa-solid fa-scroll mr-1"></i> Audit Log
        </button>
      </div>

      <!-- Users Table -->
      <div id="tab-users" class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <div id="users-loading" class="flex items-center justify-center py-16">
          <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-2xl"></i>
        </div>
        <div id="users-table" class="hidden overflow-x-auto">
          <table class="data-table">
            <thead class="bg-gray-800/50">
              <tr>
                <th>User</th><th>Email</th><th>Role</th><th>Status</th><th>Last Login</th><th>Created</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-tbody"></tbody>
          </table>
        </div>
      </div>

      <!-- Audit Log Table -->
      <div id="tab-audit" class="hidden bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <div id="audit-loading" class="flex items-center justify-center py-16">
          <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-2xl"></i>
        </div>
        <div id="audit-table" class="hidden overflow-x-auto">
          <table class="data-table">
            <thead class="bg-gray-800/50">
              <tr><th>User</th><th>Action</th><th>Resource</th><th>Detail</th><th>Time</th></tr>
            </thead>
            <tbody id="audit-tbody"></tbody>
          </table>
          <div class="p-3 text-center text-gray-500 text-sm" id="audit-empty" class="hidden">No audit logs yet</div>
        </div>
      </div>
    </div>
  </main>

  <!-- Edit User Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-md">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-white font-semibold">Edit User</h3>
        <button onclick="closeModal('edit-modal')" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <form id="edit-form" class="space-y-4">
        <input type="hidden" id="edit-id" />
        <div><label class="block text-gray-400 text-sm mb-1">Full Name</label>
          <input type="text" id="edit-name" class="form-input" /></div>
        <div><label class="block text-gray-400 text-sm mb-1">Email</label>
          <input type="email" id="edit-email" class="form-input" /></div>
        <div><label class="block text-gray-400 text-sm mb-1">Role</label>
          <select id="edit-role" class="form-input form-select">
            <option value="analyst">Analyst</option>
            <option value="admin">Admin</option>
          </select></div>
        <div><label class="block text-gray-400 text-sm mb-1">New Password <span class="text-gray-600">(leave blank to keep)</span></label>
          <input type="password" id="edit-password" class="form-input" placeholder="••••••••" /></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn btn-primary flex-1">Save Changes</button>
          <button type="button" onclick="closeModal('edit-modal')" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Create User Modal -->
  <div id="create-modal" class="modal-overlay hidden">
    <div class="modal-box max-w-md">
      <div class="flex items-center justify-between mb-5">
        <h3 class="text-white font-semibold">Create User</h3>
        <button onclick="closeModal('create-modal')" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
      </div>
      <form id="create-form" class="space-y-4">
        <div><label class="block text-gray-400 text-sm mb-1">Username *</label>
          <input type="text" id="c-username" class="form-input" required /></div>
        <div><label class="block text-gray-400 text-sm mb-1">Full Name *</label>
          <input type="text" id="c-name" class="form-input" required /></div>
        <div><label class="block text-gray-400 text-sm mb-1">Email *</label>
          <input type="email" id="c-email" class="form-input" required /></div>
        <div><label class="block text-gray-400 text-sm mb-1">Password *</label>
          <input type="password" id="c-password" class="form-input" required /></div>
        <div><label class="block text-gray-400 text-sm mb-1">Role</label>
          <select id="c-role" class="form-input form-select">
            <option value="analyst">Analyst</option>
            <option value="admin">Admin</option>
          </select></div>
        <div class="flex gap-3 pt-2">
          <button type="submit" class="btn btn-primary flex-1">Create User</button>
          <button type="button" onclick="closeModal('create-modal')" class="btn btn-secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <style>
    .tab-btn { color: #6b7280; }
    .tab-btn.active { background: #374151; color: #fff; }
  </style>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    function showTab(tab) {
      ['users','audit'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
        document.getElementById(`tab-${t}-btn`).classList.toggle('active', t === tab);
      });
      if (tab === 'audit') loadAudit();
    }

    // ── Users ─────────────────────────────────────────────────
    async function loadUsers() {
      try {
        const data = await apiGet('/api/users');
        document.getElementById('users-loading').classList.add('hidden');
        document.getElementById('users-table').classList.remove('hidden');
        document.getElementById('users-tbody').innerHTML = data.items.map(u => `
          <tr>
            <td>
              <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold text-sm">
                  ${u.full_name[0].toUpperCase()}
                </div>
                <div>
                  <p class="text-sm font-medium text-white">${u.full_name}</p>
                  <p class="text-xs text-gray-500">@${u.username}</p>
                </div>
              </div>
            </td>
            <td><span class="text-xs text-gray-400">${u.email}</span></td>
            <td><span class="badge ${u.role==='admin'?'badge-critical':'badge-low'}">${u.role.toUpperCase()}</span></td>
            <td><span class="badge ${u.is_active?'badge-low':'badge-medium'}">${u.is_active?'Active':'Inactive'}</span></td>
            <td><span class="text-xs text-gray-500">${u.last_login ? timeAgo(u.last_login) : 'Never'}</span></td>
            <td><span class="text-xs text-gray-500">${timeAgo(u.created_at)}</span></td>
            <td>
              <div class="flex gap-1">
                <button onclick="openEditModal(${JSON.stringify(u).replace(/"/g,'&quot;')})" class="btn btn-secondary btn-sm" title="Edit">
                  <i class="fa-solid fa-pen"></i>
                </button>
                <button onclick="toggleActive(${u.id}, ${u.is_active})" class="btn btn-sm ${u.is_active?'bg-yellow-500/10 border-yellow-500/30 text-yellow-400':'bg-green-500/10 border-green-500/30 text-green-400'}" title="${u.is_active?'Deactivate':'Activate'}">
                  <i class="fa-solid ${u.is_active?'fa-ban':'fa-check'}"></i>
                </button>
                <button onclick="deleteUser(${u.id},'${u.username}')" class="btn btn-sm bg-red-500/10 border border-red-500/30 text-red-400 hover:bg-red-500/20" title="Delete">
                  <i class="fa-solid fa-trash"></i>
                </button>
              </div>
            </td>
          </tr>`).join('');
      } catch(err) {
        document.getElementById('users-loading').innerHTML = `<p class="text-red-400 text-center">${err.message}</p>`;
      }
    }

    function openEditModal(u) {
      document.getElementById('edit-id').value = u.id;
      document.getElementById('edit-name').value = u.full_name;
      document.getElementById('edit-email').value = u.email;
      document.getElementById('edit-role').value = u.role;
      document.getElementById('edit-password').value = '';
      document.getElementById('edit-modal').classList.remove('hidden');
    }

    document.getElementById('edit-form').addEventListener('submit', async e => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const payload = {
        full_name: document.getElementById('edit-name').value,
        email:     document.getElementById('edit-email').value,
        role:      document.getElementById('edit-role').value,
      };
      const pw = document.getElementById('edit-password').value;
      if (pw) payload.password = pw;
      try {
        await apiPatch(`/api/users/${id}`, payload);
        showToast('User updated', 'success');
        closeModal('edit-modal');
        loadUsers();
      } catch(err) { showToast(err.message, 'error'); }
    });

    async function toggleActive(id, isActive) {
      try {
        await apiPatch(`/api/users/${id}`, { is_active: !isActive });
        showToast(isActive ? 'User deactivated' : 'User activated', 'success');
        loadUsers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    async function deleteUser(id, username) {
      if (!confirm(`Delete user "${username}"? This cannot be undone.`)) return;
      try {
        await apiFetch(`/api/users/${id}`, { method: 'DELETE' });
        showToast('User deleted', 'success');
        loadUsers();
      } catch(err) { showToast(err.message, 'error'); }
    }

    function openCreateModal() {
      document.getElementById('create-form').reset();
      document.getElementById('create-modal').classList.remove('hidden');
    }

    document.getElementById('create-form').addEventListener('submit', async e => {
      e.preventDefault();
      try {
        await apiPost('/api/auth/register', {
          username:  document.getElementById('c-username').value,
          full_name: document.getElementById('c-name').value,
          email:     document.getElementById('c-email').value,
          password:  document.getElementById('c-password').value,
          role:      document.getElementById('c-role').value,
        });
        showToast('User created', 'success');
        closeModal('create-modal');
        loadUsers();
      } catch(err) { showToast(err.message, 'error'); }
    });

    // ── Audit Log ─────────────────────────────────────────────
    async function loadAudit() {
      document.getElementById('audit-loading').classList.remove('hidden');
      document.getElementById('audit-table').classList.add('hidden');
      try {
        const data = await apiGet('/api/audit', { page_size: 100 });
        document.getElementById('audit-loading').classList.add('hidden');
        document.getElementById('audit-table').classList.remove('hidden');
        if (!data.items.length) {
          document.getElementById('audit-tbody').innerHTML = '';
          document.getElementById('audit-empty').classList.remove('hidden');
          return;
        }
        document.getElementById('audit-tbody').innerHTML = data.items.map(l => `
          <tr>
            <td><span class="text-xs text-gray-300">@${l.username||'system'}</span></td>
            <td><span class="badge badge-low text-xs">${l.action}</span></td>
            <td><span class="text-xs text-gray-400 capitalize">${l.resource||'—'} ${l.resource_id?`#${l.resource_id}`:''}</span></td>
            <td><span class="text-xs text-gray-500 truncate max-w-xs block">${l.detail||'—'}</span></td>
            <td><span class="text-xs text-gray-500">${timeAgo(l.created_at)}</span></td>
          </tr>`).join('');
      } catch(err) {
        document.getElementById('audit-loading').innerHTML = `<p class="text-red-400 text-center p-8">${err.message}</p>`;
      }
    }

    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
    document.querySelectorAll('.modal-overlay').forEach(m =>
      m.addEventListener('click', e => { if (e.target === m) m.classList.add('hidden'); }));

    loadUsers();
  </script>
</body>
</html>
