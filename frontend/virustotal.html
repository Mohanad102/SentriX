<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SentriX — VirusTotal Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-gray-950 text-gray-100 flex" id="body">

  <!-- Sidebar -->
  <aside class="sidebar bg-gray-900 border-r border-gray-800 flex flex-col min-h-screen sticky top-0">
    <div class="p-5 border-b border-gray-800">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center">
          <i class="fa-solid fa-shield-halved text-emerald-400 text-sm"></i>
        </div>
        <span class="text-white font-bold text-lg">Sentri<span class="text-emerald-400">X</span></span>
      </div>
    </div>
    <nav id="sidebar-nav" class="p-3 flex-1 space-y-1"></nav>
    <div class="p-3 border-t border-gray-800">
      <div class="flex items-center gap-3 px-2 py-2">
        <div class="w-8 h-8 rounded-full bg-emerald-500/20 flex items-center justify-center text-emerald-400 font-bold text-sm user-avatar">A</div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-white truncate user-name">Admin</p>
          <p class="text-xs text-gray-500 user-role">ADMIN</p>
        </div>
        <button onclick="logout()" class="text-gray-500 hover:text-red-400 transition"><i class="fa-solid fa-right-from-bracket text-sm"></i></button>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 min-h-screen overflow-auto">
    <header class="bg-gray-900/50 border-b border-gray-800 px-6 py-4 sticky top-0 backdrop-blur z-10">
      <div class="flex items-center justify-between">
        <div>
          <h1 class="text-white font-semibold text-lg flex items-center gap-2">
            <i class="fa-solid fa-virus-slash text-emerald-400"></i> VirusTotal Scanner
          </h1>
          <p class="text-gray-500 text-xs">Scan IPs, domains, URLs, and file hashes</p>
        </div>
        <!-- Stats bar -->
        <div id="stats-bar" class="hidden sm:flex items-center gap-4 text-xs text-gray-500">
          <span><span id="stat-total" class="text-white font-semibold">—</span> IOCs tracked</span>
          <span><span id="stat-malicious" class="text-red-400 font-semibold">—</span> malicious</span>
          <span><span id="stat-pending" class="text-yellow-400 font-semibold">—</span> pending</span>
          <button onclick="triggerEnrich()" id="enrich-btn"
            class="ml-2 px-3 py-1.5 rounded-lg border border-emerald-500/40 text-emerald-400 hover:bg-emerald-500/10 transition text-xs font-medium flex items-center gap-1">
            <i class="fa-solid fa-wand-magic-sparkles text-xs"></i> Enrich Pending
          </button>
        </div>
      </div>
    </header>

    <div class="p-6 page-fade max-w-5xl mx-auto">

      <!-- Tabs -->
      <div class="flex gap-1 mb-6 bg-gray-900 border border-gray-800 rounded-xl p-1 w-fit">
        <button onclick="showTab('scan')" id="tab-scan"
          class="tab-btn active px-4 py-2 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-magnifying-glass mr-1.5"></i>Manual Scan
        </button>
        <button onclick="showTab('iocs')" id="tab-iocs"
          class="tab-btn px-4 py-2 rounded-lg text-sm font-medium transition">
          <i class="fa-solid fa-database mr-1.5"></i>Auto-Enriched IOCs
        </button>
      </div>

      <!-- ===== MANUAL SCAN TAB ===== -->
      <div id="panel-scan">
        <!-- Search Card -->
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 mb-6">
          <div class="flex flex-col gap-4">
            <div class="flex gap-2 flex-wrap">
              <button onclick="setType('auto')"   id="btn-auto"   class="type-btn active">Auto-detect</button>
              <button onclick="setType('ip')"     id="btn-ip"     class="type-btn">IP Address</button>
              <button onclick="setType('domain')" id="btn-domain" class="type-btn">Domain</button>
              <button onclick="setType('url')"    id="btn-url"    class="type-btn">URL</button>
              <button onclick="setType('hash')"   id="btn-hash"   class="type-btn">File Hash</button>
            </div>
            <div class="flex gap-3">
              <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                <input id="scan-input" type="text"
                  placeholder="Enter IP, domain, URL, or MD5/SHA256 hash..."
                  class="form-input pl-9 w-full text-sm"
                  onkeydown="if(event.key==='Enter') scan()" />
              </div>
              <button onclick="scan()" id="scan-btn" class="btn btn-primary px-6">
                <i class="fa-solid fa-search mr-1"></i> Scan
              </button>
            </div>
          </div>
        </div>

        <!-- Result -->
        <div id="result-area"></div>

        <!-- History -->
        <div id="history-section" class="hidden">
          <div class="flex items-center justify-between mb-3">
            <h3 class="text-white font-medium flex items-center gap-2">
              <i class="fa-solid fa-clock-rotate-left text-emerald-400 text-sm"></i> Recent Scans
            </h3>
            <button onclick="clearHistory()" class="text-xs text-gray-500 hover:text-red-400 transition">Clear</button>
          </div>
          <div id="history-list" class="space-y-2"></div>
        </div>
      </div>

      <!-- ===== AUTO-ENRICHED IOCs TAB ===== -->
      <div id="panel-iocs" class="hidden">
        <!-- Filters -->
        <div class="flex flex-wrap gap-2 mb-4">
          <select id="filter-type" onchange="loadIocs(1)"
            class="form-input text-xs py-1.5 px-3 w-36">
            <option value="">All Types</option>
            <option value="ip">IP Address</option>
            <option value="domain">Domain</option>
            <option value="url">URL</option>
            <option value="hash">Hash</option>
          </select>
          <label class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-gray-700 text-xs text-gray-400 cursor-pointer hover:border-gray-600">
            <input type="checkbox" id="filter-malicious" onchange="loadIocs(1)" class="accent-red-400"> Malicious only
          </label>
          <label class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-gray-700 text-xs text-gray-400 cursor-pointer hover:border-gray-600">
            <input type="checkbox" id="filter-enriched" onchange="loadIocs(1)" class="accent-emerald-400"> Enriched only
          </label>
          <button onclick="loadIocs(1)" class="ml-auto text-xs text-emerald-400 hover:text-emerald-300 flex items-center gap-1">
            <i class="fa-solid fa-arrows-rotate"></i> Refresh
          </button>
        </div>

        <div id="ioc-table-wrap">
          <div class="text-center py-10 text-gray-500 text-sm">
            <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-xl mb-2"></i><br>Loading...
          </div>
        </div>
        <div id="ioc-pagination" class="flex justify-center gap-2 mt-4"></div>
      </div>

    </div>
  </main>

  <style>
    .type-btn {
      @apply px-3 py-1.5 rounded-lg text-xs font-medium border border-gray-700 text-gray-400 hover:border-emerald-500/50 hover:text-emerald-400 transition;
    }
    .type-btn.active {
      @apply border-emerald-500 text-emerald-400 bg-emerald-500/10;
    }
    .stat-box {
      @apply bg-gray-800/60 rounded-lg p-3 text-center;
    }
    .tab-btn {
      color: theme('colors.gray.400');
    }
    .tab-btn.active {
      background: theme('colors.emerald.500 / 10%');
      color: theme('colors.emerald.400');
    }
  </style>

  <script src="/static/js/api.js"></script>
  <script>
    if (!requireAuth()) throw new Error('Not authenticated');

    let selectedType = 'auto';
    const HISTORY_KEY = 'vt_scan_history';
    let iocPage = 1;

    // ── Tab switching ──────────────────────────────────────────────
    function showTab(tab) {
      document.getElementById('panel-scan').classList.toggle('hidden', tab !== 'scan');
      document.getElementById('panel-iocs').classList.toggle('hidden', tab !== 'iocs');
      document.getElementById('tab-scan').classList.toggle('active', tab === 'scan');
      document.getElementById('tab-iocs').classList.toggle('active', tab === 'iocs');
      if (tab === 'iocs') loadIocs(1);
    }

    // ── Stats bar ──────────────────────────────────────────────────
    async function loadStats() {
      try {
        const s = await apiGet('/api/virustotal/stats');
        document.getElementById('stat-total').textContent    = s.total;
        document.getElementById('stat-malicious').textContent = s.malicious;
        document.getElementById('stat-pending').textContent  = s.pending;
        document.getElementById('stats-bar').classList.remove('hidden');
      } catch {}
    }

    async function triggerEnrich() {
      const btn = document.getElementById('enrich-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin text-xs"></i> Enriching...';
      try {
        const r = await apiPost('/api/virustotal/enrich-pending', {});
        btn.innerHTML = `<i class="fa-solid fa-check text-xs"></i> ${r.message}`;
        setTimeout(() => {
          btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles text-xs"></i> Enrich Pending';
          btn.disabled = false;
          loadStats();
          if (!document.getElementById('panel-iocs').classList.contains('hidden')) loadIocs(iocPage);
        }, 2000);
      } catch {
        btn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles text-xs"></i> Enrich Pending';
        btn.disabled = false;
      }
    }

    // ── IOC table ──────────────────────────────────────────────────
    async function loadIocs(page) {
      iocPage = page;
      const wrap = document.getElementById('ioc-table-wrap');
      wrap.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">
        <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-xl mb-2"></i><br>Loading...</div>`;

      const type      = document.getElementById('filter-type').value;
      const malicious = document.getElementById('filter-malicious').checked;
      const enriched  = document.getElementById('filter-enriched').checked;

      let qs = `?page=${page}&page_size=15`;
      if (type)      qs += `&ioc_type=${type}`;
      if (malicious) qs += `&malicious_only=true`;
      if (enriched)  qs += `&enriched_only=true`;

      try {
        const data = await apiGet(`/api/virustotal/iocs${qs}`);
        renderIocTable(data);
      } catch (e) {
        wrap.innerHTML = `<div class="text-center py-10 text-red-400 text-sm">${e.message || 'Failed to load'}</div>`;
      }
    }

    function renderIocTable(data) {
      const wrap = document.getElementById('ioc-table-wrap');
      if (!data.items.length) {
        wrap.innerHTML = `<div class="text-center py-14 text-gray-500">
          <i class="fa-solid fa-database text-3xl mb-3 opacity-30"></i>
          <p class="text-sm">No IOCs found. New alerts will be auto-enriched as they arrive.</p></div>`;
        document.getElementById('ioc-pagination').innerHTML = '';
        return;
      }

      const rows = data.items.map(ioc => {
        const verdict = ioc.is_malicious === true
          ? `<span class="inline-flex items-center gap-1 text-red-400 text-xs font-medium"><i class="fa-solid fa-skull-crossbones"></i>Malicious</span>`
          : ioc.is_malicious === false
          ? `<span class="inline-flex items-center gap-1 text-emerald-400 text-xs font-medium"><i class="fa-solid fa-circle-check"></i>Clean</span>`
          : `<span class="text-gray-500 text-xs">—</span>`;

        const enrichedBadge = ioc.enriched
          ? `<span class="text-emerald-400 text-xs"><i class="fa-solid fa-circle-check"></i></span>`
          : `<span class="text-yellow-400 text-xs"><i class="fa-solid fa-clock"></i></span>`;

        const typeIcon = {ip:'fa-network-wired', domain:'fa-globe', url:'fa-link', hash:'fa-fingerprint'}[ioc.ioc_type] || 'fa-tag';
        const ago = ioc.enriched_at ? timeAgo(ioc.enriched_at) : (ioc.created_at ? timeAgo(ioc.created_at) : '—');

        return `<tr class="border-t border-gray-800 hover:bg-gray-800/40 transition">
          <td class="px-4 py-3">
            <span class="inline-flex items-center gap-1.5 text-xs text-gray-400">
              <i class="fa-solid ${typeIcon} w-3"></i>${ioc.ioc_type.toUpperCase()}
            </span>
          </td>
          <td class="px-4 py-3 font-mono text-sm text-gray-200 max-w-xs truncate" title="${ioc.value}">${ioc.value}</td>
          <td class="px-4 py-3 text-center">${verdict}</td>
          <td class="px-4 py-3 text-center text-sm font-mono ${ioc.is_malicious ? 'text-red-400' : 'text-gray-400'}">${ioc.vt_score || '—'}</td>
          <td class="px-4 py-3 text-center">${enrichedBadge}</td>
          <td class="px-4 py-3 text-xs text-gray-500">${ago}</td>
          <td class="px-4 py-3 text-center">
            <button onclick="quickScanFromDb('${ioc.value}','${ioc.ioc_type}')"
              class="text-xs text-emerald-400 hover:text-emerald-300 transition" title="Re-scan">
              <i class="fa-solid fa-arrows-rotate"></i>
            </button>
          </td>
        </tr>`;
      }).join('');

      wrap.innerHTML = `
        <div class="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-xs text-gray-500 uppercase tracking-wider">
                <th class="px-4 py-3 text-left">Type</th>
                <th class="px-4 py-3 text-left">Value</th>
                <th class="px-4 py-3 text-center">Verdict</th>
                <th class="px-4 py-3 text-center">Score</th>
                <th class="px-4 py-3 text-center">Enriched</th>
                <th class="px-4 py-3 text-left">Age</th>
                <th class="px-4 py-3 text-center">Actions</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;

      // Pagination
      const pag = document.getElementById('ioc-pagination');
      if (data.pages <= 1) { pag.innerHTML = ''; return; }
      let btns = '';
      for (let p = 1; p <= data.pages; p++) {
        btns += `<button onclick="loadIocs(${p})"
          class="px-3 py-1 rounded text-xs ${p === data.page ? 'bg-emerald-500/20 text-emerald-400 border border-emerald-500/40' : 'text-gray-500 border border-gray-700 hover:border-gray-600'}">${p}</button>`;
      }
      pag.innerHTML = btns;
    }

    function quickScanFromDb(value, type) {
      showTab('scan');
      document.getElementById('scan-input').value = value;
      setType(type);
      scan();
    }

    function timeAgo(isoStr) {
      const diff = Math.round((Date.now() - new Date(isoStr).getTime()) / 60000);
      if (diff < 1) return 'just now';
      if (diff < 60) return `${diff}m ago`;
      if (diff < 1440) return `${Math.round(diff/60)}h ago`;
      return `${Math.round(diff/1440)}d ago`;
    }

    // ── Manual scan ────────────────────────────────────────────────
    function setType(t) {
      selectedType = t;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${t}`).classList.add('active');
    }

    function detectType(value) {
      value = value.trim();
      if (/^(https?:\/\/)/.test(value)) return 'url';
      if (/^[a-fA-F0-9]{32}$|^[a-fA-F0-9]{40}$|^[a-fA-F0-9]{64}$/.test(value)) return 'hash';
      if (/^\d{1,3}(\.\d{1,3}){3}$/.test(value)) return 'ip';
      return 'domain';
    }

    async function scan() {
      const input = document.getElementById('scan-input').value.trim();
      if (!input) return;

      const type = selectedType === 'auto' ? detectType(input) : selectedType;
      const btn = document.getElementById('scan-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Scanning...';

      document.getElementById('result-area').innerHTML = `
        <div class="bg-gray-900 border border-gray-800 rounded-xl p-8 text-center mb-6">
          <i class="fa-solid fa-spinner fa-spin text-emerald-400 text-2xl mb-3"></i>
          <p class="text-gray-400 text-sm">Querying VirusTotal...</p>
        </div>`;

      try {
        const result = await apiPost('/api/virustotal/scan', { value: input, ioc_type: type });
        renderResult(input, type, result);
        saveHistory(input, type, result);
        loadStats();
      } catch (e) {
        document.getElementById('result-area').innerHTML = `
          <div class="bg-gray-900 border border-red-500/30 rounded-xl p-6 mb-6 text-center">
            <i class="fa-solid fa-triangle-exclamation text-red-400 text-xl mb-2"></i>
            <p class="text-red-400 text-sm">${e.message || 'Scan failed'}</p>
          </div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-search mr-1"></i> Scan';
      }
    }

    function renderResult(value, type, r) {
      const stats   = r.report?.stats || {};
      const malicious   = stats.malicious   ?? 0;
      const suspicious  = stats.suspicious  ?? 0;
      const undetected  = stats.undetected  ?? 0;
      const harmless    = stats.harmless    ?? 0;
      const total = malicious + suspicious + undetected + harmless || 1;

      const verdict = r.is_malicious
        ? { label: 'Malicious', cls: 'text-red-400', icon: 'fa-skull-crossbones', bg: 'border-red-500/40 bg-red-500/5' }
        : malicious > 0 || suspicious > 0
        ? { label: 'Suspicious', cls: 'text-yellow-400', icon: 'fa-triangle-exclamation', bg: 'border-yellow-500/40 bg-yellow-500/5' }
        : { label: 'Clean', cls: 'text-emerald-400', icon: 'fa-circle-check', bg: 'border-emerald-500/40 bg-emerald-500/5' };

      const isMock = r.report?.note?.includes('Mock');
      const mockBanner = isMock ? `
        <div class="mb-4 px-3 py-2 bg-yellow-500/10 border border-yellow-500/30 rounded-lg flex items-center gap-2 text-xs text-yellow-400">
          <i class="fa-solid fa-flask"></i>
          Demo mode — configure <code class="bg-yellow-500/10 px-1 rounded">VIRUSTOTAL_API_KEY</code> in <code class="bg-yellow-500/10 px-1 rounded">.env</code> for real results
        </div>` : '';

      const barPct = (n) => ((n / total) * 100).toFixed(1);

      document.getElementById('result-area').innerHTML = `
        <div class="bg-gray-900 border ${verdict.bg} rounded-xl p-6 mb-6">
          ${mockBanner}
          <div class="flex items-start justify-between mb-5">
            <div>
              <p class="text-xs text-gray-500 uppercase tracking-wider mb-1">${type.toUpperCase()}</p>
              <p class="text-white font-mono text-sm break-all">${value}</p>
            </div>
            <div class="flex items-center gap-2 flex-shrink-0 ml-4">
              <i class="fa-solid ${verdict.icon} ${verdict.cls} text-xl"></i>
              <span class="font-semibold text-lg ${verdict.cls}">${verdict.label}</span>
            </div>
          </div>

          <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
            <div class="stat-box">
              <p class="text-red-400 font-bold text-xl">${malicious}</p>
              <p class="text-gray-500 text-xs mt-0.5">Malicious</p>
            </div>
            <div class="stat-box">
              <p class="text-yellow-400 font-bold text-xl">${suspicious}</p>
              <p class="text-gray-500 text-xs mt-0.5">Suspicious</p>
            </div>
            <div class="stat-box">
              <p class="text-emerald-400 font-bold text-xl">${harmless}</p>
              <p class="text-gray-500 text-xs mt-0.5">Harmless</p>
            </div>
            <div class="stat-box">
              <p class="text-gray-400 font-bold text-xl">${undetected}</p>
              <p class="text-gray-500 text-xs mt-0.5">Undetected</p>
            </div>
          </div>

          <div class="mb-4">
            <div class="flex justify-between text-xs text-gray-500 mb-1">
              <span>Detection breakdown</span>
              <span class="font-medium ${verdict.cls}">${r.score}</span>
            </div>
            <div class="flex rounded-full overflow-hidden h-3 bg-gray-800">
              ${malicious  ? `<div class="bg-red-500 h-full"    style="width:${barPct(malicious)}%"   title="Malicious: ${malicious}"></div>`  : ''}
              ${suspicious ? `<div class="bg-yellow-500 h-full" style="width:${barPct(suspicious)}%"  title="Suspicious: ${suspicious}"></div>` : ''}
              ${harmless   ? `<div class="bg-emerald-500 h-full"style="width:${barPct(harmless)}%"    title="Harmless: ${harmless}"></div>`    : ''}
              ${undetected ? `<div class="bg-gray-600 h-full"   style="width:${barPct(undetected)}%"  title="Undetected: ${undetected}"></div>` : ''}
            </div>
            <div class="flex gap-4 mt-1.5 flex-wrap">
              <span class="text-xs text-red-400 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-red-500 inline-block"></span>Malicious</span>
              <span class="text-xs text-yellow-400 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-yellow-500 inline-block"></span>Suspicious</span>
              <span class="text-xs text-emerald-400 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-emerald-500 inline-block"></span>Harmless</span>
              <span class="text-xs text-gray-400 flex items-center gap-1"><span class="w-2 h-2 rounded-full bg-gray-600 inline-block"></span>Undetected</span>
            </div>
          </div>

          ${r.report?.reputation !== undefined ? `
          <div class="border-t border-gray-800 pt-3 mt-3">
            <span class="text-xs text-gray-500">Reputation score: </span>
            <span class="text-xs font-medium ${r.report.reputation < 0 ? 'text-red-400' : 'text-emerald-400'}">${r.report.reputation}</span>
          </div>` : ''}
        </div>`;
    }

    function saveHistory(value, type, result) {
      const hist = getHistory();
      const deduped = hist.filter(h => h.value !== value);
      deduped.unshift({ value, type, score: result.score, is_malicious: result.is_malicious, result, ts: Date.now() });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(deduped.slice(0, 20)));
      renderHistory();
    }

    function showFromHistory(idx) {
      const h = getHistory()[idx];
      if (!h) return;
      document.getElementById('scan-input').value = h.value;
      setType(h.type);
      renderResult(h.value, h.type, h.result);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function getHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; }
    }

    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    }

    function renderHistory() {
      const hist = getHistory();
      const section = document.getElementById('history-section');
      const list    = document.getElementById('history-list');
      if (!hist.length) { section.classList.add('hidden'); return; }
      section.classList.remove('hidden');
      list.innerHTML = hist.map((h, i) => {
        const ago = timeAgo(new Date(h.ts).toISOString());
        const dot = h.is_malicious ? 'bg-red-400' : 'bg-emerald-400';
        return `
        <div class="flex items-center gap-3 bg-gray-900 border border-gray-800 rounded-lg px-4 py-3 hover:border-gray-700 transition cursor-pointer"
             onclick="showFromHistory(${i})">
          <div class="w-2 h-2 rounded-full flex-shrink-0 ${dot}"></div>
          <span class="text-xs text-gray-500 uppercase w-14 flex-shrink-0">${h.type}</span>
          <span class="text-sm text-gray-200 font-mono flex-1 truncate">${h.value}</span>
          <span class="text-xs text-gray-500 flex-shrink-0">${h.score}</span>
          <span class="text-xs text-gray-600 flex-shrink-0">${ago}</span>
        </div>`;
      }).join('');
    }

    // Init
    loadStats();
    renderHistory();
  </script>
  <script src="/static/js/sidebar.js"></script>
</body>
</html>
